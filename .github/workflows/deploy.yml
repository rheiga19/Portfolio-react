name: CI/CD Pipeline - React Portfolio

on:
  push:
    branches:
      - main
      - master

env:
  DOCKERHUB_IMAGE: rheigaruhulqudus/portfolio-react

jobs:
  # ─────────────────────────────────────────
  # JOB 1: BUILD & PUSH KE DOCKER HUB
  # ─────────────────────────────────────────
  build:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 2: DEPLOY KE SERVER
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy container di server
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'

            echo "Pulling latest image from Docker Hub..."
            docker pull rheigaruhulqudus/portfolio-react:latest

            echo "Stopping old container..."
            docker stop react_portfolio 2>/dev/null || true
            docker rm react_portfolio 2>/dev/null || true

            echo "Starting new container..."
            docker run -d \
              --name react_portfolio \
              --restart unless-stopped \
              --network devops-lab_devops_network \
              -p 8082:80 \
              rheigaruhulqudus/portfolio-react:latest

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deploy selesai!"
            docker ps | grep react_portfolio

          EOF

      - name: Verifikasi deployment
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "docker ps --filter name=react_portfolio --format '{{.Names}} | {{.Status}} | {{.Ports}}'"